<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highlight &amp; Snip — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 20px;
      color: #e2e2e2;
      background: #151e27;
      max-width: 400px;
    }
    h2 {
      font-size: 16px;
      font-family: "Courier New", Courier, monospace;
      letter-spacing: 0.5px;
      color: #b5daff;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: rgba(181, 218, 255, 0.6);
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      color: #e2e2e2;
      background: rgba(9, 10, 23, 0.3);
      border: 1px solid rgba(181, 218, 255, 0.2);
      border-radius: 6px;
      margin-bottom: 16px;
    }
    input[type="text"]::placeholder {
      color: rgba(181, 218, 255, 0.4);
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #b5daff;
    }
    button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      background: #b5daff;
      color: #151e27;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: #9ac6f5;
    }
    .saved {
      display: inline-block;
      margin-left: 10px;
      color: #b5daff;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h2>Settings</h2>

  <label for="subfolder">Download subfolder</label>
  <p class="hint">Files save to your Downloads folder under this subfolder name.</p>
  <input type="text" id="subfolder" placeholder="highlight-snip">

  <button id="save-btn">Save</button>
  <span class="saved" id="saved-msg">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
