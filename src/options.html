<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highlight &amp; Snip — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 20px;
      color: #1a1a1a;
      max-width: 400px;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #1557b0;
    }
    .saved {
      display: inline-block;
      margin-left: 10px;
      color: #2e7d32;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h2>Settings</h2>

  <label for="subfolder">Download subfolder</label>
  <p class="hint">Files save to your Downloads folder under this subfolder name.</p>
  <input type="text" id="subfolder" placeholder="highlight-snip">

  <button id="save-btn">Save</button>
  <span class="saved" id="saved-msg">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
