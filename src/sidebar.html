<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highlight &amp; Snip</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <header>
    <h1>Highlight &amp; Snip</h1>
    <div class="actions">
      <button id="export-btn" title="Export as Markdown">Export .md</button>
      <button id="clear-btn" title="Clear all snips">Clear</button>
      <button id="settings-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <main>
    <div id="snips">
      <p class="empty-state">No snips yet. Highlight text on any page, right-click, and choose "Snip it".</p>
    </div>

    <div id="sources" hidden>
      <hr>
      <h2>Sources</h2>
      <ul id="sources-list"></ul>
    </div>
  </main>

  <script src="sidebar.js"></script>
</body>
</html>
